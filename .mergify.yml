# yaml-language-server: $schema=https://docs.mergify.com/mergify-configuration-schema.json
queue_rules:
  - name: default
    queue_conditions:
      - base=main
      - label~=merge-queue|dependencies
    # Only nix-flake-check is required: it runs the full `nix flake check`
    # including the avim-startup smoke test. Garnix is advisory because its
    # free-tier quota can run out mid-month, which would stall the queue.
    merge_conditions:
      - check-success = nix-flake-check
    merge_method: rebase

pull_request_rules:
  - name: merge using the merge queue
    conditions: []
    actions:
      queue:
