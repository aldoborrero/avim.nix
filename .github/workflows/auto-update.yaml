# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Automatic Update
on:
  # Run weekly on Sunday at 00:00 UTC (the day before the weekly release)
  schedule:
    - cron: "0 0 * * 0"

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      inputs:
        description: "Space-separated list of specific flake inputs to update (empty for all)"
        required: false
        default: ""

permissions: {}

concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ steps.app-token.outputs.token }}
          extra_nix_config: |
            accept-flake-config = true

      - name: Update flake inputs
        env:
          FLAKE_INPUTS: ${{ inputs.inputs }}
        run: |
          if [ -n "$FLAKE_INPUTS" ]; then
            for token in $FLAKE_INPUTS; do
              if ! [[ "$token" =~ ^[a-zA-Z0-9_-]+$ ]]; then
                echo "::error::Invalid flake input name: $token"
                exit 1
              fi
            done
            # shellcheck disable=SC2086
            nix flake update -- $FLAKE_INPUTS
          else
            nix flake update
          fi

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |-
          if git diff --quiet flake.lock; then
            echo "flake.lock is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C update-flake-lock
          git commit -am "flake.lock: update all inputs"
          git push -f origin update-flake-lock
          if [ -z "$(gh pr list --head update-flake-lock --state open --json number --jq '.[0].number')" ]; then
            gh pr create \
              --title "flake.lock: update all inputs" \
              --body "Weekly automated update of all flake inputs. Merged automatically by Mergify once all checks pass." \
              --label dependencies
          fi
