# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Weekly Release
on:
  # Run weekly on Monday at 00:00 UTC (after Sunday's automatic update)
  schedule:
    - cron: "0 0 * * 1"

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Fail if automated update PRs are still open
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # REST instead of `gh pr list` (GraphQL), which is flakier
          open_prs=$(gh api "repos/$REPO/issues?labels=dependencies&state=open" \
            --jq '[.[] | select(.pull_request) | .number] | join(" ")')
          if [ -n "$open_prs" ]; then
            echo "::error::Dependency update PR(s) still open: $open_prs." \
              "The release would tag main without this week's updates." \
              "Investigate why the merge queue did not merge them, then re-run this workflow."
            exit 1
          fi

      - name: Check for new commits since last release
        id: check
        run: |
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$last_tag" ] && [ -z "$(git rev-list "$last_tag"..HEAD)" ]; then
            echo "No new commits since $last_tag, skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install nix
        if: steps.check.outputs.skip != 'true'
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            accept-flake-config = true

      - name: Compute version
        if: steps.check.outputs.skip != 'true'
        id: version
        run: |
          base=$(date -u +%Y.%m.%d)
          n=0
          while git rev-parse "v$base.$n" >/dev/null 2>&1; do
            n=$((n + 1))
          done
          echo "version=$base.$n" >> "$GITHUB_OUTPUT"

      - name: Bump package version
        if: steps.check.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          printf '%s\n' "$VERSION" > packages/avim/VERSION
          actual=$(nix eval .#avim.version --raw)
          if [ "$actual" != "$VERSION" ]; then
            echo "::error::Version bump did not take effect: expected $VERSION, got $actual"
            exit 1
          fi

      - name: Run flake checks
        if: steps.check.outputs.skip != 'true'
        run: nix flake check

      - name: Commit, tag and push
        if: steps.check.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # No diff when the VERSION file already contains the computed version
          if ! git diff --quiet; then
            git commit -am "avim: release $VERSION"
          fi
          git tag "v$VERSION"
          # Retry once with a rebase in case a PR merged into main mid-run
          if ! git push origin main "v$VERSION"; then
            git pull --rebase origin main
            git push origin main "v$VERSION"
          fi

      - name: Create GitHub release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |-
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes
